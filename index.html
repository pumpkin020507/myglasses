<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Glasses 叫貨系統</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update, push, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDVFki8uELbIC7JyS93JdOIUoFrc5SxMIA",
    authDomain:        "myglasses-store-frames.firebaseapp.com",
    databaseURL:       "https://myglasses-store-frames-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "myglasses-store-frames",
    storageBucket:     "myglasses-store-frames.firebasestorage.app",
    messagingSenderId: "265931454599",
    appId:             "1:265931454599:web:c162da74b3957be006a022"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._db=db; window._ref=ref; window._set=set; window._get=get;
  window._onValue=onValue; window._update=update; window._push=push; window._remove=remove;
  window._firebaseReady=true;
  document.dispatchEvent(new Event("firebase-ready"));
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#f4f6f9; --surface:#fff; --border:#e2e6ed; --border2:#cbd0da;
  --accent:#3b6ff0; --accent-l:#eef2ff; --accent2:#7c5cfc;
  --gold:#d97706; --gold-l:#fef3c7;
  --red:#dc2626; --red-l:#fee2e2;
  --green:#059669; --green-l:#d1fae5;
  --orange:#ea580c; --orange-l:#ffedd5;
  --text:#1a1d27; --text2:#4b5268; --muted:#8b93a8;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --mono:'DM Mono',monospace; --sans:'Noto Sans TC',sans-serif; --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#e8edf8,#f4f6f9);}
.lbox{background:#fff;border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:360px;box-shadow:0 8px 40px rgba(59,111,240,.12);}
.lbox .logo{font-size:12px;font-weight:700;letter-spacing:3px;color:var(--accent);text-align:center;margin-bottom:4px;}
.lbox .brand{font-size:26px;font-weight:700;text-align:center;margin-bottom:32px;}
.lbox label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.lbox input,.lbox select{width:100%;padding:12px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:15px;margin-bottom:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.lbox input:focus,.lbox select:focus{border-color:var(--accent);}
.lbtn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-family:var(--sans);font-size:16px;font-weight:600;cursor:pointer;}
.lbtn:active{opacity:.88;}
.lerr{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:20px;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;}
.hdr-logo{font-size:17px;font-weight:700;color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:10px;}
.badge-store{background:var(--accent-l);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--accent);font-weight:600;}
.btn-logout{background:none;border:1.5px solid var(--border2);border-radius:8px;color:var(--text2);padding:6px 14px;font-family:var(--sans);font-size:13px;cursor:pointer;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.nav-tabs{display:flex;overflow-x:auto;padding:0 20px;border-top:1px solid var(--border);scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{padding:10px 18px;border:none;background:none;color:var(--muted);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

main{flex:1;padding:20px;max-width:1000px;width:100%;margin:0 auto;}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* QUOTA */
.quota-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:680px){.quota-grid{grid-template-columns:repeat(2,1fr);}}
.qi{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.qi-lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.3px;margin-bottom:6px;}
.qi-val{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1;}
.qi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.pbar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px;}
.pfill{height:100%;border-radius:4px;transition:width .4s;}

/* TIME BAR */
.tbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:13px;font-weight:500;}
.tbar.info{background:var(--accent-l);border:1px solid #c7d7fc;color:var(--accent);}
.tbar.open{background:var(--green-l);border:1px solid #a7f3d0;color:var(--green);}
.tbar.closed{background:var(--red-l);border:1px solid #fecaca;color:var(--red);}

/* STORE CARD */
.scard{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden;}
.scard-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.scard-head.confirmed{background:var(--green-l);border-color:#a7f3d0;}
.scard-head.submitted{background:var(--gold-l);border-color:#fde68a;}
.sname{font-size:15px;font-weight:700;}
.scard-body{padding:16px 18px;}

/* SECTION TABS */
.sec-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.sec-tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--text2);transition:all .15s;white-space:nowrap;touch-action:manipulation;}
.sec-tab.t-order {background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.sec-tab.t-custom{background:var(--orange-l);border-color:var(--orange);color:var(--orange);}
.sec-tab.t-new   {background:#f3f0ff;border-color:var(--accent2);color:var(--accent2);}
.sec-tab.t-extra {background:var(--gold-l);border-color:var(--gold);color:var(--gold);}

/* ITEM ROW */
.item-list{display:flex;flex-direction:column;gap:8px;}
.item-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:600;}
.item-meta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.qbtn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border2);background:#fff;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;touch-action:manipulation;transition:all .15s;}
.qbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.qnum{font-family:var(--mono);font-size:16px;font-weight:700;min-width:28px;text-align:center;}
.ssel{padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);font-family:var(--sans);font-size:12px;font-weight:600;background:#fff;color:var(--text2);cursor:pointer;-webkit-appearance:none;flex-shrink:0;}
.rbtn{width:34px;height:34px;border-radius:8px;border:none;background:var(--red-l);color:var(--red);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0;}
.rbtn:hover{background:var(--red);color:#fff;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
@media(min-width:620px){.modal-bg{align-items:center;} .modal{border-radius:16px!important;max-width:520px;}}
.modal{background:#fff;width:100%;max-height:90vh;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.15);}
.modal-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-hdr h3{font-size:16px;font-weight:700;}
.xbtn{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* PICKER */
.cat-row{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border);scrollbar-width:none;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-pill{padding:7px 18px;border-radius:20px;border:1.5px solid var(--border);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;background:#fff;color:var(--text2);transition:all .15s;touch-action:manipulation;}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.srch-wrap{padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.srch-inp{width:100%;padding:10px 14px 10px 36px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;color:var(--text);outline:none;}
.srch-inp:focus{border-color:var(--accent);}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
.picker-list{flex:1;overflow-y:auto;padding:10px 12px;}
.pi{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;cursor:pointer;border:1.5px solid transparent;margin-bottom:6px;touch-action:manipulation;transition:all .15s;}
.pi:hover,.pi.sel{background:var(--accent-l);border-color:var(--accent);}
.pi-name{font-size:14px;font-weight:600;}
.pi-meta{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.pi-badge{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;background:#fff;}
.qty-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.qty-row label{font-size:13px;font-weight:600;color:var(--text2);}
.qbig{width:46px;height:46px;border-radius:10px;border:1.5px solid var(--border2);background:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;touch-action:manipulation;}
.qbig:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.qbig-num{font-family:var(--mono);font-size:24px;font-weight:700;min-width:40px;text-align:center;}

/* SETTINGS FORM */
.sf-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:460px){.sf-grid{grid-template-columns:1fr;}}
.sf-item label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.sf-item input,.sf-item select{width:100%;padding:10px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;color:var(--text);outline:none;-webkit-appearance:none;}
.sf-item input:focus,.sf-item select:focus{border-color:var(--accent);}

/* UPLOAD */
.upzone{border:2px dashed var(--border2);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;}
.upzone:hover{border-color:var(--accent);background:var(--accent-l);}

/* CATALOG */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
.cat-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;}
.cat-iname{font-size:13px;font-weight:600;}
.cat-imeta{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}

/* HISTORY */
.htable{width:100%;border-collapse:collapse;}
.htable th{text-align:left;padding:10px 14px;font-size:12px;font-weight:700;color:var(--muted);border-bottom:1.5px solid var(--border);background:var(--bg);}
.htable td{padding:12px 14px;font-size:14px;border-bottom:1px solid var(--border);}
.htable tr:last-child td{border-bottom:none;}
.htable tr:hover td{background:var(--bg);}

/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;touch-action:manipulation;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.bp{background:var(--accent);color:#fff;} .bp:hover:not(:disabled){background:#2d5ce0;}
.bs{background:var(--green);color:#fff;}  .bs:hover:not(:disabled){background:#047857;}
.bd{background:var(--red);color:#fff;}
.bg{background:var(--gold);color:#fff;}
.bgh{background:var(--bg);color:var(--text2);border:1.5px solid var(--border2);} .bgh:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:7px 14px;font-size:13px;}
.btn-full{width:100%;}

/* BADGE */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.b-pen{background:var(--accent-l);color:var(--accent);}
.b-ok {background:var(--green-l);color:var(--green);}
.b-sh {background:var(--red-l);color:var(--red);}
.b-wt {background:var(--gold-l);color:var(--gold);}

.newprod-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.fend{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;}
.text-muted{color:var(--muted);}
.text-sm{font-size:13px;}
.text-xs{font-size:11px;}
.mono{font-family:var(--mono);}
.mt-12{margin-top:12px;}

/* 通知彈窗 */
#notif-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;align-items:center;justify-content:center;}
#notif-overlay.show{display:flex;}
#notif-box{
  background:#fff;border-radius:16px;padding:28px 24px;max-width:380px;width:90%;
  box-shadow:0 12px 48px rgba(0,0,0,.2);text-align:center;
  animation:notifPop .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes notifPop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.notif-icon{font-size:40px;margin-bottom:10px;}
.notif-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
.notif-body{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:16px;}
.notif-store{font-size:12px;color:var(--muted);margin-bottom:16px;}
.btn-notif-close{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;}

/* TOAST */
#toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
.toast{background:var(--text);color:#fff;border-radius:24px;padding:10px 22px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:tin .3s ease;pointer-events:none;}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <div class="logo">MY GLASSES</div>
    <div class="brand">👓 叫貨管理系統</div>
    <label>門市 / 身份</label>
    <select id="l-store">
      <option value="">── 請選擇 ──</option>
      <option value="admin">🔑 管理者</option>
      <option value="minsheng">民生門市</option>
      <option value="hetdi">河堤門市</option>
    </select>
    <label>密碼</label>
    <input type="password" id="l-pw" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">登入</button>
    <div class="lerr" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="hdr-top">
      <div class="hdr-logo">👓 My Glasses 叫貨系統</div>
      <div class="hdr-right">
        <div class="badge-store" id="hdr-store">—</div>
        <button class="btn-logout" onclick="doLogout()">登出</button>
      </div>
    </div>
    <div class="nav-tabs" id="nav-tabs"></div>
  </header>
  <main id="mc"></main>
</div>

<!-- MODAL: 選品 -->
<div class="modal-bg" id="m-pick">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="m-pick-title">選擇品項</h3>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="pick-added-count" style="font-size:12px;color:var(--green);font-weight:600"></span>
        <button class="btn bp btn-sm" onclick="closeModal('m-pick')">完成</button>
      </div>
    </div>
    <div class="srch-wrap" style="position:relative">
      <span class="srch-ico">🔍</span>
      <input class="srch-inp" id="pick-srch" placeholder="搜尋型號或顏色…" oninput="filterPicker(this.value)">
    </div>
    <div class="cat-row" id="pick-cats"></div>
    <div class="picker-list" id="pick-list"></div>
    <div class="modal-foot">
      <div id="pick-remain-hint" style="font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center"></div>
      <div class="qty-row">
        <label>數量</label>
        <button class="qbig" onclick="pickQD(-1)">−</button>
        <span class="qbig-num" id="pick-qty">1</span>
        <button class="qbig" onclick="pickQD(1)">＋</button>
      </div>
      <!-- 一般叫貨：客訂勾選 -->
      <div id="pick-urgent-wrap" style="display:none;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;background:var(--red-l);border:1.5px solid #fca5a5;border-radius:10px;padding:10px 14px">
          <input type="checkbox" id="pick-urgent" style="width:18px;height:18px;cursor:pointer;accent-color:var(--red)"
            onchange="toggleUrgentQty(this.checked)">
          <label for="pick-urgent" style="font-size:14px;font-weight:700;color:var(--red);cursor:pointer">⚡ 此件為客訂</label>
        </div>
        <div id="pick-urgent-qty-wrap" style="display:none;margin-top:8px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px">客訂數量（可與一般叫貨不同）</div>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="qbig" style="width:36px;height:36px" onclick="urgentQtyDelta(-1)">−</button>
            <span id="pick-urgent-qty" style="font-family:var(--mono);font-size:20px;font-weight:700;min-width:32px;text-align:center">1</span>
            <button class="qbig" style="width:36px;height:36px" onclick="urgentQtyDelta(1)">＋</button>
            <span style="font-size:12px;color:var(--muted)">隻</span>
          </div>
        </div>
      </div>
      <!-- 客訂/小追加：備註欄 -->
      <div id="pick-note-wrap" style="display:none;margin-bottom:10px">

  document.getElementById("prev-val-"+sid).style.display="";
  document.getElementById("prev-edit-"+sid).style.display="none";
}
function savePrevDed(sid){
  const val=parseInt(document.getElementById("prev-inp-"+sid).value)||0;

  if(!cfg.storeQuotas[sid]) cfg.storeQuotas[sid]=storeQ(sid);

  const q=cfg.storeQuotas&&cfg.storeQuotas[sid];

// ─── 登入 ───
function doLogin(){
  const s=document.getElementById("l-store").value;
  const p=document.getElementById("l-pw").value;
  const err=document.getElementById("l-err");
  if(!s){err.textContent="請選擇門市";return;}
  const a=ACC[s];

  me={id:s,role:a.role,name:a.name};
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="flex";

  else if(a.role==="store") document.addEventListener("firebase-ready",listenNotifications,{once:true});

  autoResetOnNewWeek();
}
function doLogout(){
  me=null;

// ─── 分頁 ───
const T_ADMIN=[{id:"order",l:"📋 本週叫貨"},{id:"newprod",l:"🆕 新品"},{id:"catalog",l:"📦 品項庫"},{id:"history",l:"🗂 歷史"}];
const T_STORE=[{id:"order",l:"📋 叫貨單"},{id:"history",l:"🗂 歷史"}];
function buildTabs(){
  const ts=me.role==="admin"?T_ADMIN:T_STORE;
  document.getElementById("nav-tabs").innerHTML=ts.map(t=>
    `<button class="nav-tab${t.id===tab?" active":""}" onclick="switchTab('${t.id}',this)">${t.l}</button>`
  ).join("");
}
function switchTab(id,el){
  tab=id;
  document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("active"));
  if(el)el.classList.add("active");
  render();
}

// ─── Firebase ───
function loadFB(){
  const db=window._db,r=window._ref,onV=window._onValue;
  onV(r(db,"weekConfig"),s=>{
    if(s.exists()) cfg={...cfg,...s.val()};
    // 補上新欄位預設值（相容舊 Firebase 資料沒有這些欄位的情況）
    if(cfg.customDay===undefined) cfg.customDay=-1;
    if(cfg.extraDay ===undefined) cfg.extraDay =-1;
    if(cfg.newDay   ===undefined) cfg.newDay   =-1;
    if(cfg.customStart===undefined) cfg.customStart="00:00";
    if(cfg.customEnd  ===undefined) cfg.customEnd  ="23:59";
    if(cfg.extraStart ===undefined) cfg.extraStart ="00:00";
    if(cfg.extraEnd   ===undefined) cfg.extraEnd   ="23:59";
    if(cfg.newStart   ===undefined) cfg.newStart   ="00:00";
    if(cfg.newEnd     ===undefined) cfg.newEnd     ="23:59";
    if(me)render();
  });
  onV(r(db,"storeOrders"),s=>{orders=s.exists()?s.val():{};if(me){render();if(tab==="order")restoreActiveSec();}});
  onV(r(db,"newProducts"),s=>{newProds=s.exists()?Object.values(s.val()):[];if(me){render();if(tab==="order")restoreActiveSec();}});
  onV(r(db,"catalog_extra"),s=>{
    if(s.exists())Object.values(s.val()).forEach(e=>{if(!catalog.find(c=>c.id===e.id&&c.color===e.color))catalog.push(e);});
  });
  // catalog_full：由庫存報表同步寫入，優先取用
  onV(r(db,"catalog_full"),s=>{
    if(s.exists()){
      const full=Object.values(s.val());
      if(full.length>10) catalog=full; // 只要有完整資料就覆蓋內建品項庫
    }
  });
  onV(r(db,"history"),s=>{
    history=s.exists()?Object.entries(s.val()).map(([k,v])=>({key:k,...v})).sort((a,b)=>b.ts-a.ts):[];
    if(me)render();
  });
}
function saveFB(path,data){if(window._firebaseReady)window._set(window._ref(window._db,path),data);}

// ─── 主渲染 ───
function render(){
  const el=document.getElementById("mc");
  if(tab==="order")  el.innerHTML=renderOrder();
  if(tab==="newprod")el.innerHTML=renderNewProd();

}

// ══ 叫貨分頁 ══
function renderOrder(){

    if(isSecOpen("custom")) openParts.push(`🛒 客訂（截止 ${cfg.customEnd||"23:59"}）`);

  // 額度看板：各門市分開顯示
  const storeSids=isA?Object.keys(ACC).filter(k=>ACC[k].role==="store"):[me.id];
  h+=`<div class="card">

  storeSids.forEach(sid=>{
    const sq=storeQ(sid);
    const base=sq.quota||0, adj=sq.adjust||0, prev=sq.prevDeductions||0;
    const fQ=Math.max(0,base-prev+adj);
    const usedN=sumSecFor(sid,"order");
    const pct=Math.min(100,usedN/Math.max(1,fQ)*100);
    const color=pct>=100?"var(--red)":pct>=70?"var(--orange)":"var(--green)";
    h+=`<div style="background:var(--bg);border:1.5px solid ${color}40;border-radius:10px;padding:14px 16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">${ACC[sid]?.name||sid}</div>
      <div style="display:flex;align-items:baseline;gap:6px">

  h+=`</div></div>`;

  h+=`<div class="card">
    <div class="card-title">📌 下週額度扣除明細（各門市）</div>
    <div style="display:flex;flex-direction:column;gap:10px">`;
  storeSids.forEach(sid=>{
    const sq=storeQ(sid);
    const confirmedDed=sq.thisWeekDed||0;  // 本週已確認的客訂+新品+追加
    const pendingCustom=sumSecFor(sid,"custom");

    h+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px">

function renderStore(sid,sq,isA){
  const finalQ=Math.max(0,(sq.quota||0)-(sq.prevDeductions||0)+(sq.adjust||0));
  const a=ACC[sid], o=orders[sid]||{};
  const locked=!!o.confirmed;
  // 各區獨立送出狀態
  const orderSubmitted  = !!o.orderSubmitted  && !locked;
  const customSubmitted = !!o.customSubmitted  && !locked;
  const extraSubmitted  = !!o.extraSubmitted   && !locked;
  const anySubmitted    = orderSubmitted||customSubmitted||extraSubmitted;
  const isMe=me.id===sid;
  const openOrder  = checkTime().open;
  const openCustom = checkCustomTime().open;
  const openExtra  = checkExtraTime().open;
  const openNew    = checkNewTime().open;
  // canEdit：已送出品項鎖住（sentTs存在），未送出可改
  // canAddNew：只要時間開放且未達上限就可新增，不管有沒有送出
  const canEditItems={
    order:  !locked&&(isA||(isMe&&isSecOpen("order"))),
    custom: !locked&&(isA||(isMe&&isSecOpen("custom"))),
    new:    !locked&&isA,
    extra:  !locked&&(isA||(isMe&&isSecOpen("extra"))),
  };
  const canAddNew=canEditItems;  // 新增和編輯用同一組規則
  const canEditSec=canEditItems;
  const canAny=Object.values(canAddNew).some(Boolean);
  const hCls=locked?"confirmed":anySubmitted?"submitted":"";

  const SECS=[
    {key:"order", label:"一般叫貨", cls:"t-order", lim:finalQ},
    {key:"custom",label:"客訂區",   cls:"t-custom",lim:9999},
    {key:"new",   label:"🆕 新品",  cls:"t-new",   lim:9999, adminOnly:true},
    {key:"extra", label:"小追加區", cls:"t-extra", lim:cfg.extraLimit||8},

  const vis=SECS.filter(s=>!s.adminOnly||isA);

  let h=`<div class="scard">
    <div class="scard-head ${hCls}">
      <div class="sname">${a.name}</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

          ?`<span class="bdg b-ok">✅ 本週已確認</span>`

    </div>
    <div class="scard-body">
      ${locked&&o.confirmedSummary?`
        <div style="background:var(--green-l);border:1px solid #a7f3d0;border-radius:10px;padding:14px 16px;margin-bottom:14px">
          <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px">✅ 本週叫貨已確認</div>

            ${o.confirmedSummary.new?`<span>🆕 新品：<strong>${o.confirmedSummary.new}</strong> 隻</span>`:""}
            ${o.confirmedSummary.extra?`<span>➕ 小追加：<strong>${o.confirmedSummary.extra}</strong> 隻</span>`:""}

            </div>
            ${stCtrl}
            <div class="qty-wrap">
              ${canEditThisItem
                ?`<button class="qbtn" onclick="chQty('${sid}','${s.key}',${idx},-1)">−</button>
                  <span class="qnum">${item.qty||1}</span>
                  <button class="qbtn" onclick="chQty('${sid}','${s.key}',${idx},1)">＋</button>`
                :`<span class="qnum">${item.qty||1}</span>`}
            </div>
            ${canEditThisItem?`<button class="rbtn" onclick="rmItem('${sid}','${s.key}',${idx})">✕</button>`:""}
          </div>
          ${noteField}
        </div>`;
      });
      h+=`</div><div class="sec-total" style="font-size:12px;color:var(--muted);text-align:right;margin-top:6px">小計：${tot} 隻</div>`;
    }
    // ── 各區專屬送出按鈕（只在自己的區顯示） ──
    h+=`<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">`;
    if(canAddNew[s.key]){
      const addLabel=secSubmittedNow?"＋ 追加品項":"＋ 新增品項";
      h+=`<button class="btn bgh btn-sm" onclick="openPicker('${sid}','${s.key}')">${addLabel}</button>`;
    }
    // 送出按鈕只屬於當前區
    if(isMe&&!locked){
      const unsent=(o[s.key]||[]).some(x=>!x.sentTs);
      const secOpen=isSecOpen(s.key);
      const btnStyles={order:"background:var(--accent);color:#fff",custom:"background:var(--orange);color:#fff",extra:"background:var(--gold);color:#fff"};
      const btnLabels={order:"📤 送出一般叫貨",custom:"📤 送出客訂",extra:"📤 送出小追加"};
      if(s.key!=="new"&&secOpen&&unsent)
        h+=`<button class="btn btn-sm" style="${btnStyles[s.key]||''}" onclick="submitSec('${sid}','${s.key}')">${btnLabels[s.key]||"📤 送出"}</button>`;
      if(s.key!=="new"&&secSubmittedNow&&!unsent)
        h+=`<span class="bdg b-ok" style="font-size:12px">✅ 已送出</span>`;
    }
    // 管理者重開此區
    if(isA&&secSubmittedNow&&!locked&&s.key!=="new"){
      h+=`<button class="btn bgh btn-sm" onclick="unlockSec('${sid}','${s.key}')">🔓 重新開放</button>`;
    }
    h+=`</div>`;
    h+=`</div>`;
  });

  h+=`<div class="divider"></div>
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">備註</div>
    ${canAny
      ?`<textarea rows="2" style="width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:13px;resize:vertical;outline:none" onchange="updNote('${sid}',this.value)">${o.note||""}</textarea>`
      :`<div style="font-size:13px;color:var(--muted)">${o.note||"──"}</div>`}`;

  if(!locked&&isA){
    h+=`<div class="fend"><button class="btn bgh btn-sm" onclick="saveOrder('${sid}')">💾 儲存</button></div>`;
  }
  h+=`</div></div>`;
  return h;
}

function addNewProdManual(){
  const id   =(document.getElementById("np-id")?.value||"").trim();

// ══ 歷史 ══
function renderHistory(){
  const isA=me.role==="admin";
  const myH=isA?history:history.filter(h=>h.store===me.id);

  // ── 月 > 週 > 日 三層分組 ──
  const months={};
  myH.forEach(rec=>{
    const d=new Date(rec.ts);
    const year=d.getFullYear(), mon=d.getMonth()+1;
    const day=String(d.getDate()).padStart(2,"0");
    const firstDay=new Date(year,mon-1,1).getDay()||7;
    const weekNum=Math.ceil((d.getDate()+firstDay-1)/7);
    const mKey=`${year}/${String(mon).padStart(2,"0")}`;
    const wKey=`W${weekNum}`;
    const dKey=`${year}/${String(mon).padStart(2,"0")}/${day}`;
    if(!months[mKey]) months[mKey]={label:`${year} 年 ${mon} 月`,ts:rec.ts,weeks:{}};
    if(rec.ts>months[mKey].ts) months[mKey].ts=rec.ts;
    if(!months[mKey].weeks[wKey]) months[mKey].weeks[wKey]={label:`第 ${weekNum} 週`,ts:rec.ts,days:{}};
    const dayLabel=`${mon}/${day} (${["日","一","二","三","四","五","六"][d.getDay()]})`;
    const dFullKey=`${rec.store}_${dKey}`;
    if(!months[mKey].weeks[wKey].days[dFullKey])
      months[mKey].weeks[wKey].days[dFullKey]={label:dayLabel,store:rec.store,ts:rec.ts,recs:[]};
    months[mKey].weeks[wKey].days[dFullKey].recs.push(rec);
  });

  const recQty=r=>r.items&&r.items.length?r.items.reduce((a,x)=>a+(x.qty||0),0):(r.orderTotal||0)+(r.customTotal||0)+(r.extraTotal||0)+(r.newTotal||0);
  let gi=0;
  let h=`<div class="card">
    <div class="card-title">🗂 歷史叫貨記錄
      <span class="text-muted text-sm" style="font-weight:400;margin-left:4px">▸ 點擊展開</span>
    </div>`;

  const sortedMonths=Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!sortedMonths.length){
    h+=`<div class="empty">尚無歷史記錄</div>`;
  } else {
    sortedMonths.forEach(([mKey,month])=>{
      const mId=`hg-m-${gi++}`;
      const mQty=Object.values(month.weeks).flatMap(w=>Object.values(w.days)).flatMap(d=>d.recs).reduce((s,r)=>s+recQty(r),0);
      h+=`<div style="border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--accent-l);cursor:pointer" onclick="toggleHist('${mId}')">
          <span style="font-weight:700;color:var(--accent);font-size:15px">📅 ${month.label} <span style="font-family:var(--mono);font-size:12px;font-weight:400">共 ${mQty} 隻</span></span>
          <span id="${mId}-arrow" style="color:var(--accent);font-size:16px;transition:transform .2s">▸</span>
        </div>
        <div id="${mId}" style="display:none">`;

      Object.entries(month.weeks).sort((a,b)=>b[1].ts-a[1].ts).forEach(([wKey,week])=>{
        const wId=`hg-w-${gi++}`;
        const wQty=Object.values(week.days).flatMap(d=>d.recs).reduce((s,r)=>s+recQty(r),0);
        h+=`<div style="border-top:1px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--bg);cursor:pointer" onclick="toggleHist('${wId}')">
            <span style="font-weight:600;color:var(--text2);font-size:13px">📋 ${week.label} <span style="font-family:var(--mono);font-size:12px;font-weight:400;color:var(--muted)">${wQty} 隻</span></span>
            <span id="${wId}-arrow" style="color:var(--muted);font-size:14px;transition:transform .2s">▸</span>
          </div>
          <div id="${wId}" style="display:none">`;

        Object.entries(week.days).sort((a,b)=>b[1].ts-a[1].ts).forEach(([dKey,day])=>{
          const dId=`hg-d-${gi++}`;
          const storeName=ACC[day.store]?.name||day.store;
          const dQty=day.recs.reduce((s,r)=>s+recQty(r),0);
          const secLabels=[...new Set(day.recs.map(r=>r.secLabel||"").filter(Boolean))].join("、");
          const allKeys=day.recs.map(r=>r.key).filter(Boolean);
          h+=`<div style="border-top:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:8px;padding:10px 24px;background:#fff;flex-wrap:wrap">
              <div style="flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer" onclick="toggleHist('${dId}')">
                <span style="font-size:13px;font-weight:600">${day.label}</span>
                ${isA?`<span style="color:var(--accent);font-weight:700">${storeName}</span>`:""}
                ${secLabels?`<span style="font-size:11px;color:var(--text2);background:var(--border);padding:2px 8px;border-radius:10px">${secLabels}</span>`:""}
                <span style="font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700">${dQty} 隻</span>
              </div>
              ${isA&&allKeys.length?`<button class="rbtn" style="width:28px;height:28px;flex-shrink:0" title="刪除此筆記錄" onclick="deleteHistGroup(${JSON.stringify(allKeys).replace(/"/g,"'")})">✕</button>`:""}
              <span id="${dId}-arrow" style="color:var(--muted);font-size:14px;transition:transform .2s;cursor:pointer;flex-shrink:0" onclick="toggleHist('${dId}')">▸</span>
            </div>
            <div id="${dId}" style="display:none">`;

          day.recs.forEach((rec,ri)=>{
            const secColor={order:"var(--accent)",custom:"var(--orange)",extra:"var(--gold)",new:"var(--accent2)"}[rec.sec]||"var(--muted)";
            const hasItems=rec.items&&rec.items.length>0;
            h+=`<div style="padding:12px 24px;border-top:1px solid var(--border)">
              <div style="font-size:12px;font-weight:700;color:${secColor};margin-bottom:8px">
                ${rec.secLabel||rec.sec||"叫貨"}
                <span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:6px">${new Date(rec.ts).toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})}</span>
              </div>`;
            if(!hasItems){
              h+=`<div style="font-size:13px;color:var(--muted);padding:6px 0">`;
              const tots=[];
              if(rec.orderTotal) tots.push(`一般 ${rec.orderTotal} 隻`);
              if(rec.customTotal) tots.push(`客訂 ${rec.customTotal} 隻`);
              if(rec.extraTotal) tots.push(`追加 ${rec.extraTotal} 隻`);
              h+=tots.join("、")||"（舊版記錄無明細）";
              h+=`</div>`;
            } else {
              h+=`<div style="display:flex;flex-direction:column;gap:6px">`;
              (rec.items||[]).forEach((item,ii)=>{
                const statusColor={arrived:"var(--green)",shortage:"var(--red)",pending:"var(--accent)"}[item.status]||"var(--accent)";
                const statusLabel={arrived:"已到貨",shortage:"缺貨中",pending:"補貨中"}[item.status]||"補貨中";
                h+=`<div style="display:flex;align-items:center;gap:10px;background:${item.urgent?"#fff5f5":"var(--bg)"};border:1px solid ${item.urgent?"#fca5a5":"var(--border)"};border-radius:8px;padding:8px 12px;flex-wrap:wrap">
                  <div style="flex:1;min-width:100px">
                    <div style="font-size:13px;font-weight:600">${item.urgent?'<span style="color:var(--red);font-size:11px;font-weight:700;margin-right:4px">⚡客訂</span>':""} ${item.name}</div>
                    <div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${item.id?item.id+" | ":""}${item.color}${item.note?` | 📝 ${item.note}`:""}</div>
                    ${item.urgent&&item.urgentQty?`<div style="font-size:11px;color:var(--red)">客訂：${item.urgentQty} 隻</div>`:""}
                  </div>
                  <span style="font-family:var(--mono);font-size:14px;font-weight:700">×${item.qty}</span>
                  ${isA
                    ?`<select class="ssel" style="font-size:12px" onchange="updHistStatus('${rec.key}',${ii},this.value)">
                        <option value="pending"  ${item.status==="pending" ?"selected":""}>🔵 補貨中</option>
                        <option value="arrived"  ${item.status==="arrived" ?"selected":""}>🟢 已到貨</option>
                        <option value="shortage" ${item.status==="shortage"?"selected":""}>🔴 缺貨中</option>
                      </select>`
                    :`<span style="font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;background:#fff;border:1px solid var(--border);color:${statusColor}">${statusLabel}</span>`
                  }
                </div>`;
              });
              h+=`</div>`;
            }
            h+=`</div>`;
          });
          h+=`</div></div>`;  // close dId + day div
        });
        h+=`</div></div>`;  // close wId + week div
      });
      h+=`</div></div>`;  // close mId + month div
    });
  }
  h+=`</div>`;
  return h;
}
function toggleHist(id){
  const el=document.getElementById(id);
  const arrow=document.getElementById(id+"-arrow");
  if(!el) return;
  const open=el.style.display==="none";
  el.style.display=open?"":"none";

function deleteHistGroup(keys){
  if(!confirm(`確定刪除這筆叫貨記錄？此操作無法復原。`)) return;
  if(!window._firebaseReady) return;
  (Array.isArray(keys)?keys:[keys]).forEach(k=>{
    window._remove(window._ref(window._db,"history/"+k));
    const idx=history.findIndex(h=>h.key===k);
    if(idx>=0) history.splice(idx,1);
  });
  render();
  toast("記錄已刪除","ok");
}
function updHistStatus(histKey,itemIdx,v){
  if(!window._firebaseReady) return;
  const rec=history.find(h=>h.key===histKey);
  if(!rec||!rec.items) return;
  if(itemIdx<0||itemIdx>=rec.items.length) return;
  const item=rec.items[itemIdx];
  const oldStatus=item.status||"pending";
  if(oldStatus===v) return;
  item.status=v;
  window._set(window._ref(window._db,`history/${histKey}/items/${itemIdx}/status`),v);
  const storeId=rec.store, sec=rec.sec;
  // 用品名+顏色比對同步 storeOrders（index 可能不同）
  if(orders[storeId]&&orders[storeId][sec]){
    orders[storeId][sec].forEach(x=>{
      if(x.name===item.name&&x.color===item.color) x.status=v;
    });
    saveFB("storeOrders/"+storeId, orders[storeId]);
  }
  const labels={"arrived":"✅ 已到貨","shortage":"🔴 缺貨中","pending":"🔵 補貨中"};
  toast(labels[v]||"已更新","ok");
  pushStatusNotif(storeId, item, oldStatus, v);
}

function submitSec(sid, sec){
  const secNames={order:"一般叫貨",custom:"客訂區",extra:"小追加區"};
  const items=(orders[sid]||{})[sec]||[];
  const unsent=items.filter(x=>!x.sentTs);
  if(unsent.length===0){toast(`${secNames[sec]} 尚無新品項可送出`,"err");return;}
  if(!confirm(`確定送出「${secNames[sec]}」？送出後無法修改，若需追加請再新增一筆。`)) return;
  if(!orders[sid]) orders[sid]={};
  const tsKey=sec+"Submitted";
  const now=Date.now();
  // 標記未送出品項（加 sentTs），但不清空 storeOrders
  // 管理者需要看到這些品項並確認，確認後才存入歷史並清空
  (orders[sid][sec]||[]).forEach(x=>{ if(!x.sentTs) x.sentTs=now; });
  orders[sid][tsKey]=true;
  orders[sid][tsKey+"At"]=now;
  orders[sid].submitted=true;
  orders[sid].submittedAt=orders[sid].submittedAt||now;
  saveFB("storeOrders/"+sid, orders[sid]);
  render();
  toast(`${secNames[sec]} 已送出，等待管理者確認 ✅`,"ok");
}
function confirmOrder(sid){
  if(!orders[sid]) return;
  const o=orders[sid];
  const secNames={order:"一般叫貨",custom:"客訂區",extra:"小追加區",new:"新品區"};
  const now=Date.now();

  // 計算本次確認的特殊扣除量
  const thisCustom=(o.custom||[]).reduce((s,x)=>s+(x.qty||0),0);
  const thisNew   =(o.new   ||[]).reduce((s,x)=>s+(x.qty||0),0);
  const thisExtra =(o.extra ||[]).reduce((s,x)=>s+(x.qty||0),0);

  // 把各區已送出品項存入歷史
  ["order","custom","extra","new"].forEach(sec=>{
    const items=(o[sec]||[]).filter(x=>x.sentTs);
    if(!items.length) return;
    const entry={
      ts:now, store:sid, type:"confirmed", sec:sec,
      secLabel:secNames[sec]||sec,
      items:items.map(x=>({name:x.name,id:x.id||"",color:x.color,qty:x.qty||1,
        status:x.status||"pending",note:x.note||"",urgent:x.urgent||false,urgentQty:x.urgentQty||0})),
      orderTotal:sumSecFor(sid,"order"), customTotal:sumSecFor(sid,"custom"),
      newTotal:sumSecFor(sid,"new"),     extraTotal:sumSecFor(sid,"extra"),
    };
    if(window._firebaseReady) window._push(window._ref(window._db,"history"),entry);
  });

  // 累計本週特殊叫貨到 thisWeekDed（下週將套用），不影響 prevDeductions（本週上週扣）
  if(!cfg.storeQuotas) cfg.storeQuotas={};
  if(!cfg.storeQuotas[sid]) cfg.storeQuotas[sid]={quota:50,adjust:0,extraLimit:8,extraAdjust:0,customQuota:0,customAdjust:0,newQuota:0,newAdjust:0,prevDeductions:0,thisWeekDed:0};
  cfg.storeQuotas[sid].thisWeekDed=(cfg.storeQuotas[sid].thisWeekDed||0)+thisCustom+thisNew+thisExtra;
  saveFB("weekConfig", cfg);

  // 確認後：清空品項但保留扣除數字記錄供顯示用
  // 用 confirmedSummary 儲存本次確認的數字，讓門市看到
  const summary={
    confirmedAt: now,
    custom: thisCustom, new: thisNew, extra: thisExtra,
    total: thisCustom+thisNew+thisExtra,
  };
  orders[sid]={
    confirmed: true,
    confirmedAt: now,
    confirmedSummary: summary,
  };
  saveFB("storeOrders/"+sid, orders[sid]);
  render();
  toast(`${ACC[sid].name} 叫貨已確認！客訂+新品+追加共 ${thisCustom+thisNew+thisExtra} 隻已計入下週扣除 ✅`,"ok");
}
function unlockOrder(sid){
  if(!orders[sid]) orders[sid]={};
  orders[sid].confirmed=false;
  saveFB("storeOrders/"+sid,orders[sid]);
  render();
  toast("叫貨單已解鎖，門市可繼續編輯","ok");
}
function unlockSec(sid, sec){
  if(!orders[sid]) return;
  orders[sid][sec+"Submitted"]=false;
  // 若三區都未送出，也清掉總 submitted
  if(!orders[sid].orderSubmitted&&!orders[sid].customSubmitted&&!orders[sid].extraSubmitted){
    orders[sid].submitted=false;
  }
  saveFB("storeOrders/"+sid,orders[sid]);
  render();
  const names={order:"一般叫貨",custom:"客訂區",extra:"小追加區"};
  toast(`${names[sec]||sec} 已解鎖`,"ok");
}
function lockWeek(){
  if(!confirm("確定封存本週？將計算本週客訂/新品/小追加的扣除量，並更新至下週額度。")) return;
  // 從 storeOrders（未確認）和 history（已確認）加總計算本週扣除量
  // 未確認的部分：直接從 storeOrders 加總
  let customTotal=sumSec("custom"), newTotal=sumSec("new"), extraTotal=sumSec("extra");
  // 已確認存入 history 的部分（本週，type=confirmed）
  const weekStart=Date.now()-(7*24*60*60*1000); // 過去7天內
  history.filter(h=>h.type==="confirmed"&&h.ts>weekStart).forEach(rec=>{
    if(rec.sec==="custom") customTotal+=rec.items?.reduce((s,x)=>s+(x.qty||0),0)||0;
    if(rec.sec==="new")    newTotal   +=rec.items?.reduce((s,x)=>s+(x.qty||0),0)||0;
    if(rec.sec==="extra")  extraTotal +=rec.items?.reduce((s,x)=>s+(x.qty||0),0)||0;
  });
  cfg.prevDeductions=customTotal+newTotal+extraTotal;
  saveFB("weekConfig",cfg);
  orders={}; saveFB("storeOrders",{});
  newProds=[]; saveFB("newProducts",{});
  render(); toast(`本週已封存 ✅ 下週將扣除 ${cfg.prevDeductions} 隻`,"ok");
}

function getSecLimit(sid, sec){
  const used = sumSecFor(sid, sec);
  const sq = storeQ(sid); // 各門市獨立設定
  if(sec==="order"){
    const finalQ=Math.max(0,(sq.quota||0)-(sq.prevDeductions||0)+(sq.adjust||0));
    return {limit: finalQ, used, remain: Math.max(0, finalQ-used)};
  }
  if(sec==="extra"){
    const lim=Math.max(0,(sq.extraLimit||8)+(sq.extraAdjust||0));
    return {limit: lim, used, remain: Math.max(0, lim-used)};
  }
  if(sec==="custom"){
    const lim=sq.customQuota||0;
    return {limit: lim, used, remain: lim===0 ? 9999 : Math.max(0, lim-used)};
  }
  if(sec==="new"){
    const lim=sq.newQuota||0;
    return {limit: lim, used, remain: lim===0 ? 9999 : Math.max(0, lim-used)};
  }
  return {limit:0, used:0, remain:9999};
}

  if(ps.sel===null) return;

  if(ps.sid==="__np__"){
    newProds.push({...c,qty:ps.qty,store:"all"});
    closeModal("m-pick"); render(); toast(`已新增新品：${c.name} ${c.color}`,"ok"); return;
  }
  const {sid,sec,qty}=ps;

  // ── 數量上限檢查 ──
  if(me.role!=="admin"){
    const {limit, used, remain} = getSecLimit(sid, sec);
    const secNames={order:"一般叫貨",custom:"客訂區",extra:"小追加區",new:"新品區"};
    if(remain < qty){
      const limitStr = limit===0 ? "不限制" : `${limit} 隻`;
      const msg = remain<=0
        ? `${secNames[sec]} 額度已滿（上限 ${limitStr}，已叫 ${used} 隻）`
        : `數量超過剩餘額度！
剩餘可叫：${remain} 隻，你要叫 ${qty} 隻
請調整數量後再試。`;
      toast(msg, "err");
      return;
    }
  }

  const noteVal=(document.getElementById("pick-note")?.value||"").trim();
  const isUrgent=sec==="order"&&document.getElementById("pick-urgent")?.checked;
  const urgentQty=isUrgent?parseInt(document.getElementById("pick-urgent-qty")?.textContent||"1")||1:0;
  if(!orders[sid]) orders[sid]={};
  if(!orders[sid][sec]) orders[sid][sec]=[];
  const newItem={...c,qty,status:"pending",note:noteVal};
  if(isUrgent){ newItem.urgent=true; newItem.urgentQty=urgentQty; }
  orders[sid][sec].push(newItem);
  saveFB("storeOrders/"+sid,orders[sid]);

  // ── 新增後不關 modal，重設狀態繼續選下一個 ──
  ps.sel=null; ps.qty=1;
  document.getElementById("pick-qty").textContent="1";
  document.getElementById("btn-pick-ok").disabled=true;
  // 清空備註
  const noteEl=document.getElementById("pick-note");
  if(noteEl) noteEl.value="";
  // 清空客訂勾選
  const urgentEl=document.getElementById("pick-urgent");
  if(urgentEl){ urgentEl.checked=false; }
  const urgentQtyWrap=document.getElementById("pick-urgent-qty-wrap");
  if(urgentQtyWrap) urgentQtyWrap.style.display="none";
  document.getElementById("pick-urgent-qty").textContent="1";
  // 更新剩餘提示
  const hintEl=document.getElementById("pick-remain-hint");
  if(hintEl && me.role!=="admin"){
    const {limit, used, remain}=getSecLimit(sid, sec);
    const secNames={order:"一般叫貨",custom:"客訂區",extra:"小追加區"};
    if(limit>0){
      hintEl.innerHTML=`<span style="color:${remain<=0?"var(--red)":remain<=3?"var(--orange)":"var(--green)"};font-weight:600">
        ${secNames[sec]||sec}剩餘可叫：${remain} 隻 / 上限 ${limit} 隻
      </span>`;
    }
  }
  // 重新渲染品項清單（取消已選的高亮），但不關閉 modal
  renderPickList(document.getElementById("pick-srch")?.value||"");
  // 更新已加入計數
  const countEl=document.getElementById("pick-added-count");
  if(countEl){
    const cur=parseInt(countEl.textContent.replace(/[^0-9]/g,"")||"0");
    countEl.textContent=`已加入 ${cur+qty} 隻`;
  }
  // 在右下角顯示已加入提示
  toast(`✅ ${c.name} ${c.color} ×${qty} 已加入${isUrgent?" ⚡":""}`, "ok");
}

// ─── 上傳 ───
const PRICES=[1380,1780,2380,2780,3980];
async function handleUpload(e){
  const file=e.target.files[0]; if(!file) return;
  document.getElementById("up-result").innerHTML=`<div class="text-muted text-sm">⏳ 讀取中…</div>`;
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:""});

    // 判斷是「交易明細」還是「庫存報表」
    const cols=Object.keys(rows[0]||{});
    const isInventory=cols.includes("商品原價")||cols.includes("POS 分類");
    const isSales=cols.includes("銷售數量")||cols.includes("交易時間");

    if(isInventory){
      // ── 庫存報表：完整同步品項庫 ──
      const PRICES=[1380,1780,2380,2780,3980];
      const newCatalog=[];
      rows.forEach(r=>{
        const price=parseFloat(r["商品原價"]||r["售價"]||0);
        if(!PRICES.includes(price)) return;
        const id=(r["商品貨號"]||"").toString().trim().replace(/^nan$/i,"");
        const name=(r["商品名稱"]||"").toString().trim();
        const colorRaw=(r["商品款式"]||r["規格"]||"").toString().trim();
        const color=colorRaw.replace(/^顏色:\s*/,"").trim();
        if(!name.match(/^[A-Z]/i)||!color||color==="nan") return;
        if(!newCatalog.find(c=>c.name===name&&c.color===color)){
          newCatalog.push({id,name,color});
        }
      });

      if(newCatalog.length<10){
        document.getElementById("up-result").innerHTML=`<div style="color:var(--red)">❌ 讀取到品項太少（${newCatalog.length}筆），請確認是否為庫存報表格式</div>`;
        return;
      }

      const added=[], removed=[];
      // 找新增
      newCatalog.forEach(n=>{if(!catalog.find(c=>c.name===n.name&&c.color===n.color)) added.push(n);});
      // 找刪除（在舊庫存但不在新報表）
      catalog.forEach(c=>{if(!newCatalog.find(n=>n.name===c.name&&n.color===c.color)) removed.push(c);});

      // 更新 catalog
      catalog=newCatalog;
      // 存到 Firebase（用 catalog_full 節點儲存完整庫存）
      if(window._firebaseReady){
        const obj={};
        newCatalog.forEach((item,i)=>obj["i"+i]=item);
        saveFB("catalog_full",obj);
      }

      let html=`<div style="color:var(--green);font-weight:600;font-size:15px">✅ 庫存同步完成：共 ${newCatalog.length} 個款式</div>`;
      if(added.length)   html+=`<div style="color:var(--accent);font-size:13px;margin-top:8px">➕ 新增 ${added.length} 筆：${added.slice(0,5).map(x=>x.name+" "+x.color).join("、")}${added.length>5?"…":""}</div>`;
      if(removed.length) html+=`<div style="color:var(--red);font-size:13px;margin-top:4px">➖ 移除 ${removed.length} 筆（已下架款式）</div>`;
      document.getElementById("up-result").innerHTML=html;
      toast(`庫存同步完成，${newCatalog.length} 款`,"ok");

    } else if(isSales){
      // ── 銷售報表：計算額度 ──
      const PRICES=[1380,1780,2380,2780,3980];
      let total=0; const unmatched=[];
      rows.forEach(r=>{
        const price=parseFloat(r["商品單價"]||0);
        const id=(r["商品貨號"]||"").toString().trim();
        const name=(r["商品"]||r["商品名稱"]||"").toString();
        const color=(r["規格"]||"").toString().trim();
        const qty=parseInt(r["銷售數量"]||0);
        if(!PRICES.includes(price)||!id) return;
        total+=qty;
        if(!catalog.find(c=>c.id===id&&c.color===color)) unmatched.push({id,name,color});
      });
      cfg.lastSalesTotal=total;
      // 計算各門市建議額度：總銷售 - 該門市上週扣除（prevDeductions）
      const storeSuggestions={};
      Object.keys(ACC).filter(k=>ACC[k].role==="store").forEach(sid=>{
        const sq=storeQ(sid);
        const suggested=Math.max(0,total-(sq.prevDeductions||0));
        storeSuggestions[sid]=suggested;
      });
      saveFB("weekConfig",cfg);
      let html=`<div style="color:var(--green);font-weight:600;font-size:15px">✅ 上週銷售合計：${total} 隻</div>
        <div style="margin-top:10px;font-size:13px;font-weight:600;color:var(--text2)">各門市建議本週額度：</div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:6px">`;
      Object.keys(ACC).filter(k=>ACC[k].role==="store").forEach(sid=>{
        const sq=storeQ(sid);
        html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:13px">
          <span style="font-weight:600">${ACC[sid].name}</span>
          <span style="color:var(--muted)">銷售 ${total} − 上週扣 ${sq.prevDeductions||0} =</span>
          <span style="font-weight:700;color:var(--accent);font-family:var(--mono)">${storeSuggestions[sid]} 隻</span>
          <button class="btn bp btn-sm" onclick="applyQuota('${sid}',${storeSuggestions[sid]})">套用</button>
        </div>`;
      });
      html+=`</div><div style="font-size:12px;color:var(--muted);margin-top:8px">💡 點「套用」將建議額度填入各門市設定，或至 ⚙️ 設定手動調整</div>`;
      if(unmatched.length){
        html+=`<div style="color:var(--gold);font-weight:600;font-size:13px;margin-top:12px">⚠️ 以下品項不在品項庫：</div>`;
        unmatched.forEach(u=>{
          html+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px">
            <span>${u.name} ${u.color}</span>
            <button class="btn bgh btn-sm" onclick="quickAddCat('${u.id}','${encodeURIComponent(u.name)}','${encodeURIComponent(u.color)}')">+ 加入庫</button>
          </div>`;
        });
      }
      document.getElementById("up-result").innerHTML=html;
      toast(`銷售報表讀取成功，建議額度 ${cfg.quota} 隻`,"ok");
    } else {
      document.getElementById("up-result").innerHTML=`<div style="color:var(--red)">❌ 無法識別報表格式，請確認為庫存報表或交易明細</div>`;
    }
  }catch(err){
    document.getElementById("up-result").innerHTML=`<div style="color:var(--red)">❌ 讀取失敗：${err.message}</div>`;
  }
}
function applyQuota(sid, val){
  if(!cfg.storeQuotas) cfg.storeQuotas={};
  if(!cfg.storeQuotas[sid]) cfg.storeQuotas[sid]=storeQ(sid);
  cfg.storeQuotas[sid].quota=val;
  saveFB("weekConfig",cfg);
  render();
  toast(`${ACC[sid]?.name||sid} 額度已設為 ${val} 隻`,"ok");
}
function quickAddCat(id,name,color){
  const n=decodeURIComponent(name),c=decodeURIComponent(color);
  if(!catalog.find(x=>x.id===id&&x.color===c)){
    const item={id,name:n,color:c};
    catalog.push(item);
    if(window._firebaseReady) window._push(window._ref(window._db,"catalog_extra"),item);
    toast(`已加入 ${n} ${c}`,"ok");
  }
}

// ─── 工具 ───
function sumSec(sec){return Object.keys(ACC).filter(k=>ACC[k].role==="store").reduce((s,sid)=>s+sumSecFor(sid,sec),0);}
function sumSecFor(sid,sec){return((orders[sid]||{})[sec]||[]).reduce((s,i)=>s+(i.qty||0),0);}
// ─── 歷史/狀態同步 ───
function syncHistoryStatus(storeId, sec, itemName, itemColor, newStatus){
  // 在 history 陣列中找同一門市+同一品名+顏色的記錄，同步更新
  history.forEach(rec=>{
    if(rec.store!==storeId) return;
    if(!rec.items) return;
    rec.items.forEach((item,ii)=>{
      if(item.name===itemName&&item.color===itemColor){
        if(item.status===newStatus) return;
        item.status=newStatus;
        // 寫回 Firebase history
        if(window._firebaseReady){
          window._set(window._ref(window._db,`history/${rec.key}/items/${ii}/status`),newStatus);
        }
      }
    });
  });
}

// ─── 自動清空（週一）───
function autoResetOnNewWeek(){
  const today=new Date().getDay();
  const orderDay=parseInt(cfg.day??1);
  if(today!==orderDay) return;
  const oneWeekAgo=Date.now()-(7*24*60*60*1000);
  let changed=false;
  Object.keys(ACC).filter(k=>ACC[k].role==="store").forEach(sid=>{
    // 清空已確認的舊訂單
    const o=orders[sid];
    if(o&&o.confirmed&&o.confirmedAt&&o.confirmedAt<oneWeekAgo){
      orders[sid]={};
      saveFB("storeOrders/"+sid, {});
      changed=true;
    }
    // 把 thisWeekDed 轉成 prevDeductions（供新週計算），清空 thisWeekDed
    if(cfg.storeQuotas&&cfg.storeQuotas[sid]){
      const sq=cfg.storeQuotas[sid];
      if((sq.thisWeekDed||0)>0||(sq.prevDeductions||0)>0){
        sq.prevDeductions=sq.thisWeekDed||0;
        sq.thisWeekDed=0;
        changed=true;
      }
    }
  });
  if(changed){
    saveFB("weekConfig",cfg);
    render();
    toast("新的一週開始，額度已更新 🔄","ok");
  }
}

// ─── 通知系統 ───
let _lastNotifTs=0; // 避免自己寫的通知觸發自己

function pushStatusNotif(storeId, item, oldStatus, newStatus){
  if(!window._firebaseReady) return;
  const statusLabel={"arrived":"已到貨","shortage":"缺貨中","pending":"補貨中"};
  const notif={
    ts: Date.now(),
    targetStore: storeId,
    itemName: item.name||"",
    itemColor: item.color||"",
    oldStatus: oldStatus,
    newStatus: newStatus,
    oldLabel: statusLabel[oldStatus]||oldStatus,
    newLabel: statusLabel[newStatus]||newStatus,
  };
  window._push(window._ref(window._db,"notifications"), notif);
}

function listenNotifications(){
  if(!window._firebaseReady||me.role==="admin") return;
  _lastNotifTs=Date.now();
  // 用 onChildAdded 只監聽「新增」的通知節點，避免重複觸發
  const {query, ref:fref, orderByChild, startAt, onChildAdded} = {
    query: window._query || null,
    ref: window._ref,
    orderByChild: window._orderByChild || null,
    startAt: window._startAt || null,
    onChildAdded: window._onChildAdded || null,
  };
  // fallback：用 onValue 但記住已處理過的 key
  const _seenKeys=new Set();
  window._onValue(window._ref(window._db,"notifications"), snap=>{
    if(!snap.exists()) return;
    const entries=Object.entries(snap.val());
    entries.forEach(([key, n])=>{
      if(_seenKeys.has(key)) return; // 已處理過，跳過
      _seenKeys.add(key);
      if(n.targetStore!==me.id) return; // 不是給我的
      if(n.ts <= _lastNotifTs) return;  // 登入前的舊通知跳過
      showNotif(n);
    });
  });
}

function showNotif(n){
  const icons={"arrived":"✅","shortage":"🔴","pending":"🔵"};
  const colors={"arrived":"var(--green)","shortage":"var(--red)","pending":"var(--accent)"};
  document.getElementById("notif-icon").textContent=icons[n.newStatus]||"📦";
  document.getElementById("notif-title").textContent="貨品狀態更新";
  document.getElementById("notif-body").innerHTML=
    `<strong>${n.itemName}</strong> ${n.itemColor}<br>
    <span style="color:var(--muted)">${n.oldLabel}</span>
    <span style="margin:0 8px;font-size:18px">→</span>
    <span style="color:${colors[n.newStatus]||"var(--accent)"};font-weight:700">${n.newLabel}</span>`;
  document.getElementById("notif-store").textContent="";
  document.getElementById("notif-overlay").classList.add("show");
  // 震動提示（手機/平板）
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
}

function closeNotif(){
  document.getElementById("notif-overlay").classList.remove("show");
}

function checkTime()      {return checkSecTime(cfg.day       !==undefined?cfg.day      :1,  cfg.start      ||"13:00", cfg.end       ||"21:00");}
function checkCustomTime(){return checkSecTime(cfg.customDay !==undefined?cfg.customDay:-1, cfg.customStart||"00:00", cfg.customEnd ||"23:59");}
function checkExtraTime() {return checkSecTime(cfg.extraDay  !==undefined?cfg.extraDay :-1, cfg.extraStart ||"00:00", cfg.extraEnd  ||"23:59");}
function checkNewTime()   {return checkSecTime(cfg.newDay    !==undefined?cfg.newDay   :-1, cfg.newStart   ||"00:00", cfg.newEnd    ||"23:59");}
// isSecOpen：安全版，cfg 欄位不存在時預設開放（-1=不限制）
function isSecOpen(sec){
  const map={
    order:  {day:cfg.day,       start:cfg.start||"13:00",       end:cfg.end||"21:00"},
    custom: {day:cfg.customDay, start:cfg.customStart||"00:00", end:cfg.customEnd||"23:59"},
    extra:  {day:cfg.extraDay,  start:cfg.extraStart||"00:00",  end:cfg.extraEnd||"23:59"},
    new:    {day:cfg.newDay,    start:cfg.newStart||"00:00",    end:cfg.newEnd||"23:59"},
  };
  const s=map[sec]||{day:-1,start:"00:00",end:"23:59"};
  const day = (s.day===undefined||s.day===null) ? -1 : parseInt(s.day);
  return checkSecTime(day, s.start, s.end).open;
}
function checkSecTime(day,start,end){
  const now=new Date(),tod=now.getDay(),t=now.getHours()*60+now.getMinutes();
  const [sh,sm]=(start||"00:00").split(":").map(Number);
  const [eh,em]=(end||"23:59").split(":").map(Number);
  const days=["日","一","二","三","四","五","六"];
  const dayInt=parseInt(day);
  if(dayInt!==-1 && tod!==dayInt) return{open:false,msg:`開放日：週${days[dayInt]}，今日未開放`};
  if(t<sh*60+sm) return{open:false,msg:`${start} 開放，尚未開始`};
  if(t>eh*60+em) return{open:false,msg:`已截止（${end}）`};
  return{open:true,msg:""};
}
function openModal(id){document.getElementById(id).classList.add("show");}
function closeModal(id){document.getElementById(id).classList.remove("show");}
function toast(msg,type="ok"){
  const el=document.createElement("div");
  el.className=`toast ${type}`;el.textContent=msg;
  document.getElementById("toast-wrap").appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

document.querySelectorAll(".modal-bg").forEach(bg=>{

document.getElementById("notif-overlay").addEventListener("click",e=>{
